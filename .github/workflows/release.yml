name: Release

# Fires when a version tag is pushed (e.g. `git tag v0.2.17 && git push --tags`).
# The tag MUST match the version in Cargo.toml — the `verify-version` job
# enforces this so a mistyped tag can never publish a wrong version to crates.io.
on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    name: verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag vs Cargo.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          crate_version=$(grep -E '^version = ' Cargo.toml | head -n1 | sed -E 's/version = "(.*)"/\1/')
          echo "tag=$tag_version crate=$crate_version"
          if [ "$tag_version" != "$crate_version" ]; then
            echo "::error::Tag ($tag_version) does not match Cargo.toml version ($crate_version)"
            exit 1
          fi

  verify-build:
    name: test + dry-run publish
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib --bins --all-targets
      - run: cargo publish --dry-run

  publish:
    name: publish to crates.io
    needs: verify-build
    runs-on: ubuntu-latest
    environment: crates-io   # optional: gate publish behind a GitHub Environment approval
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  github-release:
    name: create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract the section for this tag from CHANGELOG.md if present,
          # otherwise fall back to auto-generated notes from commit history.
          if [ -f CHANGELOG.md ] && grep -q "^## \[${GITHUB_REF_NAME#v}\]" CHANGELOG.md; then
            awk -v ver="${GITHUB_REF_NAME#v}" '
              $0 ~ "^## \\["ver"\\]" { grab=1; next }
              grab && /^## \[/ { exit }
              grab { print }
            ' CHANGELOG.md > release-notes.md
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi
